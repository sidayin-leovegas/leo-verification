<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doc Verification Gyro</title>
    <link rel="stylesheet" type="text/css" href="css/styles.css">
    <script src="https://unpkg.com/@rive-app/canvas@latest/rive.js"></script>
</head>
<body>
    <div id="sensor-overlay">
        <button id="start-btn">Start Verification Experience 4</button>
    </div>
    
    <div class="container">
        <h6>Device Verification</h6>
        <div class="top-animation">
            <canvas id="mainCanvas"></canvas>
        </div>
        <div id="loader-container" style="display: none; width: 100%; height: 6px; background: #e0e0e0; border-radius: 10px; margin-top: 10px; overflow: hidden;">
            <div id="progress-bar" style="width: 0%; height: 100%; background: var(--success-mid); transition: width 0.1s linear;"></div>
        </div>
    </div>
    <script src="js/init.js"></script>  
</body>
</html>
