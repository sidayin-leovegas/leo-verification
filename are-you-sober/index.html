<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doc Verification Gyro</title>
    <link rel="stylesheet" type="text/css" href="css/styles.css">
    <script src="https://unpkg.com/@rive-app/canvas@latest/rive.js"></script>
</head>
<body>
    <div id="sensor-overlay">
        <button id="start-btn">Start Verification Experience 1</button>
    </div>
    
    <div class="container">
        <h6>Device Verification</h6>
        <div class="top-animation">
            <canvas id="mainCanvas"></canvas>
        </div>
        <div class="loader-container" id="loader-parent" style="display: none;">
            <div class="loader-bar" id="progress-bar"></div>
        </div>
    </div>    
    <script src="js/init.js"></script>  
</body>
</html>
