<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Brand intro screens - POC 2026</title>
    <link rel="stylesheet" type="text/css" href="css/styles.css">
    <script src="https://unpkg.com/@rive-app/canvas@latest/rive.js"></script>
</head>
<body>

<div class="container">
    <h6>Brand intro screens 2026</h6>
    
    <p class="ux-instructions">
        Select a brand and speed, then generate the intro animation.
    </p>
    
    <div class="interface-wrapper">
        <p class="group-label">Brand</p>
        <div class="theme-grid" id="theme-group">
            <input type="radio" id="option-b" name="theme-group" value="LeoVegas">
            <label for="option-b">LeoVegas</label>
            <input type="radio" id="option-c" name="theme-group" value="BetMGM">
            <label for="option-c">BetMGM</label>
            <!-- <input type="radio" id="option-d" name="theme-group" value="Expekt">
            <label for="option-d">Expekt</label> -->
            <input type="radio" id="option-e" name="theme-group" value="GoGo">
            <label for="option-e">GoGo Casino</label>
            <!-- <input type="radio" id="option-f" name="theme-group" value="RoyalPanda">
            <label for="option-f">Royal Panda</label> -->
            <input type="radio" id="option-g" name="theme-group" value="Pink">
            <label for="option-g">Pink Casino</label>
            <input type="radio" id="option-h" name="theme-group" value="BetUK">
            <label for="option-h">BetUK</label>
            <input type="radio" id="option-i" name="theme-group" value="21uk">
            <label for="option-i">21 UK</label>

            <input type="radio" id="option-j" name="theme-group" value="SlotBoss">
            <label for="option-j">SlotBoss</label>
        </div>

        <p class="group-label">Speed</p>
        <div class="status-grid" id="speed-group">
            <input type="radio" id="speed-slow" name="speed-group" value="9000">
            <label for="speed-slow">Slow (10s)</label>
            <input type="radio" id="speed-reg" name="speed-group" value="4000">
            <label for="speed-reg">Regular (5s)</label>
            <input type="radio" id="speed-fast" name="speed-group" value="2000">
            <label for="speed-fast">Fast (3s)</label>
        </div>

        <p class="group-label">Custom text</p>
        <input type="text" id="welcomeInput" class="full-input" value="Welcome to" placeholder="Enter text...">

        <button id="generateBtn" class="generate-button" disabled>Generate Animation</button>
    </div>
</div>

<div id="animationModal" class="modal-overlay">
    <div class="modal-content">
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<script src="js/init.js"></script>
</body>
</html>
